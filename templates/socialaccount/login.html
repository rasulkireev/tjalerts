{% extends "base.html" %}
{% load widget_tweaks %}
{% load socialaccount %}

{% block meta %}
<title>Social Login | Tech Job Alerts</title>
<meta name="robots" content="noindex, follow" />
{% endblock meta %}

{% block content %}
<div class="app-narrow py-10 sm:py-14">
  <div class="auth-panel text-center">
    <h1 class="text-2xl font-semibold tracking-tight text-zinc-950">Continue with {{ provider.name }}</h1>
    <p class="mt-2 text-sm leading-6 text-zinc-600">Use {{ provider.name }} to sign in to Tech Job Alerts.</p>
    <form action="" method="post" no_visible_fields=True class="mt-6">
      {% csrf_token %}
      <button type="submit" class="btn-primary w-full">Continue</button>
    </form>
  </div>
</div>
{% endblock content %}
