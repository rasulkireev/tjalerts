{% extends "base.html" %}
{% load markdown_extras %}
{% load webpack_loader static %}

{% block content %}
<div class="app-narrow py-10 sm:py-14">
  <div class="app-panel">
    <h1 class="text-2xl font-semibold tracking-tight text-zinc-950">Create alert</h1>
    <form action="" method="post" enctype="multipart/form-data" class="mt-6 space-y-4">
      {% csrf_token %}
      {{ form }}
      <button type="submit" class="btn-primary">Create alert</button>
    </form>
  </div>
</div>
{% endblock content %}
