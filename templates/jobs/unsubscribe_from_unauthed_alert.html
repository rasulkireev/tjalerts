{% extends "base.html" %}
{% load markdown_extras %}
{% load widget_tweaks %}
{% load webpack_loader static %}
{% load url_utils %}

{% block content %}
<div class="app-narrow py-10 sm:py-14">
  <div class="auth-panel text-center">
    <h1 class="text-2xl font-semibold tracking-tight text-zinc-950">Unsubscribe from this alert?</h1>
    <p class="mt-2 text-sm leading-6 text-zinc-600">This stops future emails for the selected alert.</p>
    <form method="post" action="{% url 'unauthed_alert_unsubscribe' alert_email_send.id %}" class="mt-6">
      {% csrf_token %}
      <button class="btn-danger w-full" type="submit">Unsubscribe</button>
    </form>
  </div>
</div>
{% endblock content %}
